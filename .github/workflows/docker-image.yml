name: Docker Image CI

on:
  push:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        name: Checkout code

      - name: Set up Docker Context for Buildx
        run: docker context create builders

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          version: latest
          endpoint: builders

#      - name: Set up QEMU
#        uses: docker/setup-qemu-action@v2
#        with:
#          platforms: linux/arm64

      - name: Login to DockerHub
        # Only login if we're going to push (main or develop branches)
        if: github.ref_name == 'main' || github.ref_name == 'develop'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract tag name and set image_name
        id: tag
        run: |
          tag_part=$(echo "${{ github.ref_name }}" | sed 's#keycloak/##' | tr / _)-$(git rev-parse --short HEAD)
          echo ${tag_part}
          echo "tag_name=${tag_part}" >> $GITHUB_ENV

      # Build and push for main branch
      - name: Build and push Docker image (main)
        if: github.ref_name == 'main'
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: proteantecs/registry:${{ env.tag_name }}
          push: true
          platforms: 'linux/amd64'

      # Build and push for develop branch
      - name: Build and push Docker image (develop)
        if: github.ref_name == 'develop'
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: proteantecs/registry:${{ env.tag_name }}
          push: true
          platforms: 'linux/amd64'

      # Build only for other branches (verification)
      - name: Build Docker image (verification only)
        if: github.ref_name != 'main' && github.ref_name != 'develop'
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: proteantecs/registry:${{ env.tag_name }}
          push: false
          platforms: 'linux/amd64'